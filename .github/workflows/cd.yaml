name: CD — Deploy to EKS

on:
  # Se dispara automáticamente cuando CI termina con éxito
  workflow_run:
    workflows: ["CI — Build & Push"]
    types:
      - completed
  # También permite disparo manual desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    # En workflow_run solo corre si CI pasó; en workflow_dispatch corre siempre
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # AWS Academy: actualizar los tres secrets antes de cada sesión (~4h expiry)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name ev3-lab-eks

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl apply -f k8s/frontend-hpa.yaml

      - name: Rolling update backend & frontend
        run: |
          kubectl rollout restart deployment tienda-backend  -n tienda
          kubectl rollout restart deployment tienda-frontend -n tienda
          kubectl rollout status  deployment tienda-backend  -n tienda --timeout=300s
          kubectl rollout status  deployment tienda-frontend -n tienda --timeout=300s
