name: CD — Deploy to EKS

on:
  # Se dispara automáticamente cuando CI termina con éxito
  workflow_run:
    workflows: ["CI — Build & Push"]
    types:
      - completed
  # Permite disparo manual con tag opcional (útil para rollback o demo)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de imagen a desplegar (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # Resuelve el tag: SHA del commit si viene de CI, input si es manual
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      # AWS Academy: actualizar los tres secrets antes de cada sesión (~4h expiry)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name ev3-lab-eks

      - name: Apply infrastructure manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl apply -f k8s/frontend-hpa.yaml

      # Crea los deployments si no existen, luego actualiza la imagen al SHA exacto
      - name: Deploy backend & frontend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          kubectl get deployment tienda-backend  -n tienda 2>/dev/null || kubectl apply -f k8s/backend-deployment.yaml
          kubectl get deployment tienda-frontend -n tienda 2>/dev/null || kubectl apply -f k8s/frontend-deployment.yaml

          kubectl set image deployment/tienda-backend  backend=$REGISTRY/ev3-lab-backend:$TAG  -n tienda
          kubectl set image deployment/tienda-frontend frontend=$REGISTRY/ev3-lab-frontend:$TAG -n tienda

          echo "Imagen desplegada: $TAG"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment tienda-backend  -n tienda --timeout=300s
          kubectl rollout status deployment tienda-frontend -n tienda --timeout=300s
