name: CI/CD Prueba DevOps EV3

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  ci:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install & test
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Frontend — install & test
        working-directory: frontend
        run: |
          npm ci
          npm test

  cd:
    name: Build → Push → Deploy
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AWS Academy: credenciales temporales (~4h). Actualizar los tres secrets
      # en GitHub → Settings → Secrets antes de cada sesión de laboratorio.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/ev3-lab-frontend:latest ./frontend
          docker build -t $REGISTRY/ev3-lab-backend:latest  ./backend
          docker build -t $REGISTRY/ev3-lab-db:latest       ./db
          docker push $REGISTRY/ev3-lab-frontend:latest
          docker push $REGISTRY/ev3-lab-backend:latest
          docker push $REGISTRY/ev3-lab-db:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region us-east-1 --name ev3-lab-eks

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml
          kubectl apply -f k8s/mysql-deployment.yaml
          kubectl apply -f k8s/mysql-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-hpa.yaml
          kubectl apply -f k8s/frontend-hpa.yaml

      - name: Rolling update backend & frontend
        run: |
          kubectl rollout restart deployment tienda-backend  -n tienda
          kubectl rollout restart deployment tienda-frontend -n tienda
          kubectl rollout status  deployment tienda-backend  -n tienda --timeout=120s
          kubectl rollout status  deployment tienda-frontend -n tienda --timeout=120s
